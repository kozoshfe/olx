<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Генератор описів ноутбуків</title>

<!-- ✅ ВБУДОВАНА ІКОНКА (ПРАЦЮЄ 100%) -->
<link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAQAAAC1+jfqAAAAKklEQVR4AWP4z8Dwn4ECwDiqgFEwCkbBqBgFo2AUjIJRMApGwSgYBaNgFAAAAP//AwC0SxX3GsjUpwAAAABJRU5ErkJggg==">

<style>
body{font-family:Arial;background:#0b1020;color:#fff;padding:20px}
.container{max-width:800px;margin:auto}
input,select,textarea,button{width:100%;margin:6px 0;padding:10px;border-radius:8px;border:none}
button{background:gold;font-weight:bold;cursor:pointer}
textarea{height:200px}
.switch{display:flex;gap:10px;margin-bottom:15px}
.switch button.active{background:#22c55e;color:#000}
</style>
</head>
<body>

<div class="container">

<h2>Генератор опису</h2>

<div class="switch">
<button id="btnOlx" class="active" onclick="switchMode('olx')">OLX</button>
<button id="btnTg" onclick="switchMode('tg')">Telegram</button>
</div>

<select id="model">
<option>HP Zbook G6</option>
<option>HP Zbook G5</option>
<option>HP EliteBook 850 G7</option>
</select>

<input id="cpu" placeholder="CPU" value="i7-8750H">
<input id="ram" placeholder="RAM" value="32GB">
<input id="ssd" placeholder="SSD" value="512GB">
<input id="battery" placeholder="Battery %" value="85">
<input id="price" placeholder="Price" value="12500">

<button onclick="generate()">Згенерувати</button>

<textarea id="result"></textarea>
<button onclick="copyText()">Копіювати</button>

</div>

<script>
let mode = 'olx';

function switchMode(m){
  mode = m;
  document.getElementById('btnOlx').classList.remove('active');
  document.getElementById('btnTg').classList.remove('active');
  document.getElementById(m==='olx'?'btnOlx':'btnTg').classList.add('active');
}

function generate(){
  let model = document.getElementById('model').value;
  let cpu = document.getElementById('cpu').value;
  let ram = document.getElementById('ram').value;
  let ssd = document.getElementById('ssd').value;
  let battery = document.getElementById('battery').value;
  let price = document.getElementById('price').value;

  let text = "";

  if(mode === 'olx'){
    text = `${model} | ${cpu} | ${ram} | ${ssd}

Батарея: ${battery}%
Ціна: ${price}

Ідеальний ноутбук для роботи`;
  } else {
    text = `💻 ${model}
⚙️ ${cpu}
🧠 ${ram}
💾 ${ssd}
🔋 ${battery}%
💰 ${price}`;
  }

  document.getElementById('result').value = text;
}

function copyText(){
  let t = document.getElementById('result');
  t.select();
  document.execCommand('copy');
  alert('Скопійовано');
}
</script>

</body>
</html>
